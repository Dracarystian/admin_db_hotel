<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Hoteleria CRUD{% endblock %}</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            margin: 0;
            background: #f5f7fb;
            color: #1f2937;
        }
        header {
            background: #0f766e;
            color: #fff;
            padding: 16px 24px;
        }
        main {
            max-width: 1000px;
            margin: 24px auto;
            background: #fff;
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }
        a {
            color: #0f766e;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
        .button {
            display: inline-block;
            padding: 8px 12px;
            border-radius: 8px;
            background: #0f766e;
            color: #fff;
            margin-right: 8px;
        }
        .button.secondary {
            background: #374151;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
        }
        th, td {
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
            padding: 10px;
        }
        ul.entities {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            list-style: none;
            gap: 12px;
            padding: 0;
        }
        ul.entities li {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 12px;
            background: #f9fafb;
        }
        form p {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }
        input, select, textarea {
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<header>
    <h1>CRUD Hoteleria</h1>
</header>
<main>
    {% block content %}{% endblock %}
</main>
</body>
</html>
