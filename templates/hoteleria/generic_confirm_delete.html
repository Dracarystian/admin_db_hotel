{% extends "hoteleria/base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<h2>{{ titulo }}</h2>
<p>Confirma que deseas eliminar: <strong>{{ object }}</strong>.</p>

<form method="post">
    {% csrf_token %}
    <button class="button" type="submit">Si, eliminar</button>
    <a class="button secondary" href="{% url 'hoteleria:'|add:modelo|add:'_list' %}">Cancelar</a>
</form>
{% endblock %}
